{% extends "base.html" %}

{% block titulo %}
{{ titulo }}
{% endblock %}

{% block contenido %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        <h4>{{ titulo }}</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">

                Guardar

            </button>

            <a
                href="{% url 'lista_movimientos' %}"
                class="btn btn-secondary">

                Cancelar

            </a>

        </form>

    </div>

</div>

{% endblock %}
